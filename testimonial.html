<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Source Serif 4', Georgia, serif;
    background: #f5f0e8;
    color: #1a1a2e;
  }

  .slide-hook {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    background: linear-gradient(175deg, #1a1a2e 0%, #16162a 50%, #1a1a2e 100%);
    position: relative;
  }
  .slide-hook::before {
    content: ''; position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    border: 1px solid rgba(201,168,76,0.2);
  }
  .slide-hook .logo-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; letter-spacing: 6px;
    text-transform: uppercase; color: rgba(201,168,76,0.7);
    margin-bottom: 60px;
  }
  .slide-hook .icon { font-size: 64px; margin-bottom: 40px; }
  .slide-hook h1 {
    font-family: 'Playfair Display', serif;
    font-size: 68px; font-weight: 700; line-height: 1.15;
    color: #f5f0e8; max-width: 860px;
  }
  .slide-hook .swipe-cue {
    position: absolute; bottom: 70px;
    font-family: 'Source Serif 4', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }
  .slide-hook .swipe-cue::after { content: ' →'; }

  /* ── Testimonial content slide — centred quote style ── */
  .slide-content {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 100px 90px;
    background: #f5f0e8;
    position: relative;
  }
  .slide-content::before {
    content: '"';
    font-family: 'Playfair Display', serif;
    font-size: 300px; font-weight: 700;
    color: rgba(201,168,76,0.1);
    position: absolute; top: 80px; left: 50%;
    transform: translateX(-50%); line-height: 1;
  }
  .slide-content .slide-number {
    display: none; /* hide numbers for testimonial style */
  }
  .slide-content .icon { font-size: 48px; margin-bottom: 30px; }
  .slide-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 48px; font-weight: 600; font-style: italic;
    line-height: 1.3; color: #1a1a2e;
    margin-bottom: 30px; max-width: 800px;
  }
  .slide-content p {
    font-family: 'Source Serif 4', serif;
    font-size: 30px; font-weight: 300; line-height: 1.5;
    color: #3a3a4e; max-width: 700px;
  }
  .slide-content .brand-line {
    position: absolute; bottom: 60px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }

  .slide-cta {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    background: linear-gradient(175deg, #1a1a2e 0%, #0f0f1e 100%);
    position: relative;
  }
  .slide-cta::before {
    content: ''; position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    border: 1px solid rgba(201,168,76,0.25);
  }
  .slide-cta .icon { font-size: 56px; margin-bottom: 40px; }
  .slide-cta h2 {
    font-family: 'Playfair Display', serif;
    font-size: 56px; font-weight: 600; line-height: 1.2;
    color: #f5f0e8; margin-bottom: 30px; max-width: 800px;
  }
  .slide-cta p {
    font-family: 'Source Serif 4', serif;
    font-size: 30px; font-weight: 300; line-height: 1.5;
    color: rgba(245,240,232,0.8); max-width: 700px;
    margin-bottom: 50px;
  }
  .slide-cta .cta-url {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; letter-spacing: 3px;
    color: #c9a84c; padding: 20px 50px;
    border: 1.5px solid rgba(201,168,76,0.5);
  }
  .slide-cta .brand-footer {
    position: absolute; bottom: 65px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(201,168,76,0.4);
  }
</style>
</head>
<body>
  <div id="slide"></div>
  <script>
    function renderSlide(slide, index, total) {
      const el = document.getElementById('slide');
      if (slide.type === 'hook') {
        el.className = 'slide-hook';
        el.innerHTML = `
          <div class="logo-mark">The London Choral Service</div>
          <div class="icon">${slide.icon || ''}</div>
          <h1>${slide.headline}</h1>
          <div class="swipe-cue">Swipe to read</div>`;
      } else if (slide.type === 'cta') {
        el.className = 'slide-cta';
        el.innerHTML = `
          <div class="icon">${slide.icon || ''}</div>
          <h2>${slide.headline}</h2>
          <p>${slide.body}</p>
          <div class="cta-url">londonchoralservice.com</div>
          <div class="brand-footer">The London Choral Service</div>`;
      } else {
        el.className = 'slide-content';
        el.innerHTML = `
          <div class="icon">${slide.icon || ''}</div>
          <h2>${slide.headline}</h2>
          <p>${slide.body}</p>
          <div class="brand-line">The London Choral Service</div>`;
      }
    }
  </script>
</body>
</html>
