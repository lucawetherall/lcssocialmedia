# .github/workflows/carousel.yml
# Triggers the LCS dashboard to auto-generate and schedule carousel posts
# Runs Mon & Thu at 9am UTC

name: LCS Auto-Generate Posts

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9am UTC
    - cron: '0 9 * * 4'   # Thursday 9am UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  trigger-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Trigger auto-generate on dashboard
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.DASHBOARD_URL }}/api/auto-generate" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${{ secrets.API_KEY }}" \
            -d '{"count": 5}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "Response: $body"
          echo "HTTP Code: $http_code"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Dashboard API returned $http_code"
            exit 1
          fi
