<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Source Serif 4', Georgia, serif;
    background: #f5f0e8;
    color: #1a1a2e;
  }

  /* ── SHARED: TOP BAND ── */
  .top-band {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Serif 4', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c9a84c;
    z-index: 10;
  }

  /* ── HOOK SLIDE ── */
  .slide-hook {
    width: 1080px;
    height: 1350px;
    background: #f5f0e8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 100px 90px 80px;
  }

  .slide-hook .ghost-number {
    position: absolute;
    bottom: -80px;
    right: -20px;
    font-family: 'Playfair Display', serif;
    font-size: 520px;
    font-weight: 700;
    color: rgba(26, 26, 46, 0.07);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .slide-hook .category-label {
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8b1a1a;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .slide-hook h1 {
    font-family: 'Playfair Display', serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 1.1;
    color: #1a1a2e;
    max-width: 860px;
    margin-bottom: 44px;
    position: relative;
    z-index: 1;
  }

  .slide-hook .divider {
    width: 80px;
    height: 4px;
    background: #c9a84c;
    position: relative;
    z-index: 1;
  }

  /* ── CONTENT SLIDE ── */
  .slide-content {
    width: 1080px;
    height: 1350px;
    background: #f5f0e8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
  }

  .slide-content .ghost-number {
    position: absolute;
    top: 10px;
    left: -15px;
    font-family: 'Playfair Display', serif;
    font-size: 340px;
    font-weight: 700;
    color: rgba(26, 26, 46, 0.08);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .slide-content .tip-label {
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .slide-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.15;
    color: #1a1a2e;
    max-width: 860px;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .slide-content .divider {
    width: 60px;
    height: 3px;
    background: #c9a84c;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  .slide-content p {
    font-family: 'Source Serif 4', serif;
    font-size: 34px;
    font-weight: 300;
    line-height: 1.6;
    color: #444;
    max-width: 840px;
    position: relative;
    z-index: 1;
  }

  /* ── CTA SLIDE ── */
  .slide-cta {
    width: 1080px;
    height: 1350px;
    background: #f5f0e8;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 90px;
  }

  .slide-cta .deco-circle {
    position: absolute;
    bottom: -100px;
    right: -100px;
    width: 380px;
    height: 380px;
    border: 4px solid #c9a84c;
    border-radius: 50%;
    opacity: 0.25;
    pointer-events: none;
  }

  .slide-cta .ready-label {
    font-family: 'Source Serif 4', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .slide-cta h2 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 700;
    line-height: 1.15;
    color: #1a1a2e;
    max-width: 820px;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .slide-cta .divider {
    width: 60px;
    height: 3px;
    background: #c9a84c;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .slide-cta p {
    font-family: 'Source Serif 4', serif;
    font-size: 30px;
    font-weight: 300;
    line-height: 1.6;
    color: #555;
    max-width: 700px;
    margin-bottom: 56px;
    position: relative;
    z-index: 1;
  }

  .slide-cta .cta-url {
    background: #1a1a2e;
    color: #c9a84c;
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 24px 60px;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div id="slide"></div>

  <script>
    function renderSlide(slide, index, total) {
      const el = document.getElementById('slide');

      if (slide.type === 'hook') {
        el.className = 'slide-hook';
        el.innerHTML = `
          <div class="top-band">The London Choral Service</div>
          <div class="ghost-number">${total - 2}</div>
          <div class="category-label">${slide.footnote || 'Choral Music'}</div>
          <h1>${slide.headline}</h1>
          <div class="divider"></div>
        `;
      } else if (slide.type === 'cta') {
        el.className = 'slide-cta';
        el.innerHTML = `
          <div class="top-band">The London Choral Service</div>
          <div class="deco-circle"></div>
          <div class="ready-label">Ready to Book?</div>
          <h2>${slide.headline}</h2>
          <div class="divider"></div>
          <p>${slide.body}</p>
          <div class="cta-url">londonchoralservice.com</div>
        `;
      } else {
        el.className = 'slide-content';
        el.innerHTML = `
          <div class="top-band">The London Choral Service</div>
          <div class="ghost-number">${index}</div>
          <div class="tip-label">Tip ${index}</div>
          <h2>${slide.headline}</h2>
          <div class="divider"></div>
          <p>${slide.body}</p>
        `;
      }
    }
  </script>
</body>
</html>
