<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCS Post Approval Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ── Top Bar ── -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">The London Choral Service</span>
      <span class="topbar-sep">|</span>
      <span class="topbar-title">Post Approval Dashboard</span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-gold" id="btn-generate">Generate Batch</button>
      <button class="btn btn-outline" id="btn-settings">Schedule Settings</button>
    </div>
  </header>

  <!-- ── Main Layout ── -->
  <div class="layout">

    <!-- ── Sidebar: Filters ── -->
    <aside class="sidebar">
      <nav class="filter-nav">
        <button class="filter-btn active" data-status="all">All Posts</button>
        <button class="filter-btn" data-status="draft">Drafts</button>
        <button class="filter-btn" data-status="approved">Approved</button>
        <button class="filter-btn" data-status="scheduled">Scheduled</button>
        <button class="filter-btn" data-status="published">Published</button>
        <button class="filter-btn" data-status="failed">Failed</button>
        <button class="filter-btn" data-status="rejected">Rejected</button>
      </nav>
      <div class="sidebar-stats" id="sidebar-stats"></div>
      <div class="pause-toggle" style="padding: 12px 16px; border-bottom: 1px solid var(--border);">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
          <input type="checkbox" id="pause-all"> Pause auto-publishing
        </label>
      </div>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main">
      <div class="post-grid" id="post-grid">
        <div class="empty-state" id="empty-state">
          <p>No posts yet. Click <strong>Generate Batch</strong> to create your first drafts.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ── Post Detail Modal ── -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="post-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Edit Post</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <div class="modal-body">
        <!-- Slide Carousel -->
        <div class="slide-viewer">
          <div class="slide-preview" id="slide-preview">
            <img id="slide-image" src="" alt="Slide preview">
          </div>
          <div class="slide-nav">
            <button class="btn btn-small" id="slide-prev">&larr;</button>
            <span class="slide-counter" id="slide-counter">1 / 6</span>
            <button class="btn btn-small" id="slide-next">&rarr;</button>
          </div>
          <div class="slide-thumbnails" id="slide-thumbnails"></div>
        </div>

        <!-- Edit Panel -->
        <div class="edit-panel">
          <!-- Post Info -->
          <div class="edit-section">
            <label class="edit-label">Topic</label>
            <input type="text" class="edit-input" id="edit-topic" readonly>
          </div>

          <div class="edit-section">
            <label class="edit-label">Template</label>
            <select class="edit-select" id="edit-template"></select>
          </div>

          <div class="edit-section">
            <label class="edit-label">Status</label>
            <span class="status-badge" id="edit-status-badge"></span>
          </div>

          <div id="post-error" class="post-error" style="display:none; background: #fee; color: #c00; padding: 8px 12px; border-radius: 4px; margin: 8px 0; font-size: 13px;"></div>

          <!-- Slide Editing -->
          <div class="edit-section">
            <div class="edit-section-header">
              <label class="edit-label">Slide Content</label>
              <button class="btn btn-small btn-outline" id="btn-regenerate-slide" title="Regenerate this slide with AI">Regenerate</button>
            </div>
            <div class="slide-edit-fields">
              <label class="edit-sublabel">Type</label>
              <select class="edit-select" id="edit-slide-type">
                <option value="hook">Hook</option>
                <option value="content">Content</option>
                <option value="cta">CTA</option>
              </select>
              <label class="edit-sublabel">Icon</label>
              <input type="text" class="edit-input edit-input-short" id="edit-slide-icon">
              <label class="edit-sublabel">Headline</label>
              <input type="text" class="edit-input" id="edit-slide-headline">
              <label class="edit-sublabel">Body</label>
              <textarea class="edit-textarea" id="edit-slide-body" rows="3"></textarea>
              <label class="edit-sublabel">Footnote</label>
              <input type="text" class="edit-input" id="edit-slide-footnote">
              <button class="btn btn-small btn-gold" id="btn-save-slide">Save Slide</button>
            </div>
          </div>

          <!-- Captions -->
          <div class="edit-section">
            <label class="edit-label">Caption (shared)</label>
            <textarea class="edit-textarea" id="edit-caption" rows="3"></textarea>
          </div>

          <details class="platform-captions">
            <summary>Platform-specific captions</summary>
            <div class="edit-section">
              <label class="edit-sublabel">LinkedIn</label>
              <textarea class="edit-textarea" id="edit-caption-linkedin" rows="2" placeholder="Leave empty to use shared caption"></textarea>
            </div>
            <div class="edit-section">
              <label class="edit-sublabel">Instagram</label>
              <textarea class="edit-textarea" id="edit-caption-instagram" rows="2" placeholder="Leave empty to use shared caption"></textarea>
            </div>
            <div class="edit-section">
              <label class="edit-sublabel">Facebook</label>
              <textarea class="edit-textarea" id="edit-caption-facebook" rows="2" placeholder="Leave empty to use shared caption"></textarea>
            </div>
          </details>

          <!-- Platforms -->
          <div class="edit-section">
            <label class="edit-label">Platforms</label>
            <div class="platform-toggles" id="platform-toggles">
              <label class="toggle-label"><input type="checkbox" value="linkedin" checked> LinkedIn</label>
              <label class="toggle-label"><input type="checkbox" value="instagram" checked> Instagram</label>
              <label class="toggle-label"><input type="checkbox" value="facebook" checked> Facebook</label>
            </div>
          </div>

          <!-- Scheduling -->
          <div class="edit-section">
            <label class="edit-label">Schedule</label>
            <input type="datetime-local" class="edit-input" id="edit-schedule">
            <button class="btn btn-small btn-outline" id="btn-schedule" style="margin-top: 8px;">Set Schedule</button>
          </div>

          <!-- Actions -->
          <div class="edit-actions">
            <button class="btn btn-gold" id="btn-approve">Approve</button>
            <button class="btn btn-outline" id="btn-save-post">Save Changes</button>
            <button class="btn btn-publish" id="btn-publish">Publish Now</button>
            <button id="btn-retry" class="btn btn-warning" style="display:none">Retry</button>
            <button id="btn-rerender" class="btn btn-outline" style="display:none">Re-render Slides</button>
            <button class="btn btn-reject" id="btn-reject">Reject</button>
            <button class="btn btn-danger" id="btn-delete">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Generate Modal ── -->
  <div class="modal-overlay" id="generate-overlay">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2 class="modal-title">Generate Batch</h2>
        <button class="modal-close" id="generate-close">&times;</button>
      </div>
      <div class="modal-body modal-body-centered">
        <p>How many draft posts would you like to generate?</p>
        <div class="generate-controls">
          <input type="number" class="edit-input" id="generate-count" min="1" max="20" value="5">
          <button class="btn btn-gold" id="btn-generate-go">Generate</button>
        </div>
        <div class="generate-progress" id="generate-progress" style="display:none;">
          <div class="spinner"></div>
          <p id="generate-status">Generating posts...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Settings Modal ── -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2 class="modal-title">Schedule Settings</h2>
        <button class="modal-close" id="settings-close">&times;</button>
      </div>
      <div class="modal-body modal-body-centered">
        <div class="edit-section">
          <label class="edit-label">Recurring Days</label>
          <div class="day-toggles" id="day-toggles">
            <label class="toggle-label"><input type="checkbox" value="monday"> Mon</label>
            <label class="toggle-label"><input type="checkbox" value="tuesday"> Tue</label>
            <label class="toggle-label"><input type="checkbox" value="wednesday"> Wed</label>
            <label class="toggle-label"><input type="checkbox" value="thursday"> Thu</label>
            <label class="toggle-label"><input type="checkbox" value="friday"> Fri</label>
            <label class="toggle-label"><input type="checkbox" value="saturday"> Sat</label>
            <label class="toggle-label"><input type="checkbox" value="sunday"> Sun</label>
          </div>
        </div>
        <div class="edit-section">
          <label class="edit-label">Posting Time (UTC)</label>
          <input type="time" class="edit-input" id="settings-time" value="09:00">
        </div>
        <div class="edit-section">
          <label class="edit-label">Default Batch Size</label>
          <input type="number" class="edit-input" id="settings-batch-size" min="1" max="20" value="5">
        </div>
        <button class="btn btn-gold" id="btn-save-settings" style="margin-top:16px;">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- ── Loading Overlay ── -->
  <div class="loading-overlay" id="loading-overlay" style="display:none;">
    <div class="spinner large"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
