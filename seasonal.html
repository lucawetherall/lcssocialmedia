<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Source Serif 4', Georgia, serif;
    background: #f5f0e8; color: #1a1a2e;
  }

  /* Hook — warm parchment with subtle warmth */
  .slide-hook {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    background:
      radial-gradient(ellipse at 30% 70%, rgba(139,26,26,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 30%, rgba(201,168,76,0.1) 0%, transparent 50%),
      linear-gradient(175deg, #f5f0e8 0%, #ede6d8 100%);
    position: relative; color: #1a1a2e;
  }
  .slide-hook::before {
    content: ''; position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    border: 1px solid rgba(201,168,76,0.3);
  }
  .slide-hook .logo-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 300; letter-spacing: 6px;
    text-transform: uppercase; color: rgba(201,168,76,0.8);
    margin-bottom: 50px;
  }
  .slide-hook .season-badge {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400; letter-spacing: 4px;
    text-transform: uppercase; color: #8b6914;
    padding: 10px 30px;
    border: 1px solid rgba(201,168,76,0.5);
    margin-bottom: 40px;
  }
  .slide-hook .icon { font-size: 64px; margin-bottom: 35px; }
  .slide-hook h1 {
    font-family: 'Playfair Display', serif;
    font-size: 66px; font-weight: 700; line-height: 1.15;
    max-width: 860px; color: #1a1a2e;
  }
  .slide-hook .swipe-cue {
    position: absolute; bottom: 70px;
    font-family: 'Source Serif 4', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(201,168,76,0.6);
  }
  .slide-hook .swipe-cue::after { content: ' →'; }

  /* Content — all cream parchment */
  .slide-content {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; padding: 80px 90px;
    position: relative;
    background: #f5f0e8; color: #1a1a2e;
  }
  .slide-content::after {
    content: '';
    position: absolute; bottom: 0; left: 90px; right: 90px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
  }
  .slide-content .slide-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 100px; font-weight: 300;
    color: rgba(201,168,76,0.12);
    position: absolute; top: 50px; right: 70px; line-height: 1;
  }
  .slide-content .icon { font-size: 52px; margin-bottom: 28px; }
  .slide-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 52px; font-weight: 600; line-height: 1.2;
    margin-bottom: 28px; max-width: 780px; color: #1a1a2e;
  }
  .slide-content p {
    font-family: 'Source Serif 4', serif;
    font-size: 31px; font-weight: 300; line-height: 1.55;
    max-width: 780px; color: #3a3a4e;
  }
  .slide-content .brand-line {
    position: absolute; bottom: 55px; left: 90px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(201,168,76,0.45);
  }

  .slide-cta {
    width: 1080px; height: 1350px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 80px;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.1) 0%, transparent 60%),
      linear-gradient(175deg, #f5f0e8 0%, #ede6d8 100%);
    position: relative; color: #1a1a2e;
  }
  .slide-cta::before {
    content: ''; position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    border: 1px solid rgba(201,168,76,0.35);
  }
  .slide-cta .icon { font-size: 56px; margin-bottom: 40px; }
  .slide-cta h2 {
    font-family: 'Playfair Display', serif;
    font-size: 56px; font-weight: 600; line-height: 1.2;
    margin-bottom: 30px; max-width: 800px; color: #1a1a2e;
  }
  .slide-cta p {
    font-family: 'Source Serif 4', serif;
    font-size: 30px; font-weight: 300; line-height: 1.5;
    color: #3a3a4e; max-width: 700px; margin-bottom: 50px;
  }
  .slide-cta .cta-url {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 400; letter-spacing: 3px;
    color: #8b6914; padding: 20px 50px;
    border: 1.5px solid rgba(201,168,76,0.6);
  }
  .slide-cta .brand-footer {
    position: absolute; bottom: 65px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300; letter-spacing: 4px;
    text-transform: uppercase; color: rgba(201,168,76,0.5);
  }
</style>
</head>
<body>
  <div id="slide"></div>
  <script>
    function renderSlide(slide, index, total) {
      const el = document.getElementById('slide');
      if (slide.type === 'hook') {
        el.className = 'slide-hook';
        el.innerHTML = `
          <div class="logo-mark">The London Choral Service</div>
          <div class="season-badge">Seasonal Guide</div>
          <div class="icon">${slide.icon || ''}</div>
          <h1>${slide.headline}</h1>
          <div class="swipe-cue">Swipe to read</div>`;
      } else if (slide.type === 'cta') {
        el.className = 'slide-cta';
        el.innerHTML = `
          <div class="icon">${slide.icon || ''}</div>
          <h2>${slide.headline}</h2>
          <p>${slide.body}</p>
          <div class="cta-url">londonchoralservice.com</div>
          <div class="brand-footer">The London Choral Service</div>`;
      } else {
        el.className = 'slide-content';
        el.innerHTML = `
          <div class="slide-number">${index}</div>
          <div class="icon">${slide.icon || ''}</div>
          <h2>${slide.headline}</h2>
          <p>${slide.body}</p>
          <div class="brand-line">The London Choral Service</div>`;
      }
    }
  </script>
</body>
</html>
